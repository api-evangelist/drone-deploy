naftiko: 1.0.0-alpha2
info:
  label: DroneDeploy GraphQL API — Viewer
  description: 'Naftiko capability for the DroneDeploy GraphQL API Viewer surface. Wraps the single POST /graphql
    endpoint and exposes a getViewer operation that returns the authenticated user and organization context.'
  tags:
  - DroneDeploy
  - GraphQL
  - Viewer
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    DRONEDEPLOY_API_KEY: DRONEDEPLOY_API_KEY
capability:
  consumes:
  - type: http
    namespace: graphql-viewer
    baseUri: https://www.dronedeploy.com
    description: DroneDeploy GraphQL endpoint, scoped here to viewer/organization queries.
    resources:
    - name: graphql
      path: /graphql
      operations:
      - name: getviewer
        method: POST
        description: DroneDeploy Get Viewer And Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: GraphQL request body with query and optional variables.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.DRONEDEPLOY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: graphql-viewer-rest
    port: 8080
    description: REST adapter for DroneDeploy Viewer queries; one operation per consumed query.
    resources:
    - path: /v1/viewer
      name: viewer
      description: REST surface for viewer queries.
      operations:
      - method: POST
        name: getviewer
        description: DroneDeploy Get Viewer And Organization
        call: graphql-viewer.getviewer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: graphql-viewer-mcp
    port: 9090
    transport: http
    description: MCP adapter exposing one tool for the viewer query.
    tools:
    - name: dronedeploy-get-viewer
      description: DroneDeploy Get Viewer And Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: graphql-viewer.getviewer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
