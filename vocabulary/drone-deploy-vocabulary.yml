terms:
  - term: Plan
    definition: Top-level container for a flight, walk, or capture mission and its derived outputs.
  - term: MapPlan
    definition: A Plan specialization holding aerial photogrammetry results — orthomosaic, elevation, point cloud.
  - term: Export
    definition: A user-triggered job that materialises a Plan's layer into a downloadable file (GeoTIFF, SHP, etc.).
  - term: Layer
    definition: A specific data product derived from a Plan (Orthomosaic, Elevation, Plant Health, Point Cloud, Contour, Report).
  - term: Site
    definition: A real-world location grouping multiple Plans over time for progress tracking.
  - term: Construction Volume
    definition: Usage Metric in the Master Services Agreement quantifying construction throughput billed under the Unified plan.
  - term: Walk
    definition: A 360-camera or LiDAR ground capture session; the Ground equivalent of an aerial flight.
  - term: Viewer
    definition: GraphQL root field returning the currently authenticated user and organization context.
