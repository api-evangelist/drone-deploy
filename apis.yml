description: DroneDeploy is the unified reality-capture platform for construction, agriculture, mining, energy,
  oil & gas, and inspection workflows. Founded in 2013 and headquartered in San Francisco, DroneDeploy combines
  aerial drone mapping, ground 360 capture, robotics (DJI Dock, Boston Dynamics Spot), and vision-language AI
  (Progress AI, Safety AI, Earthworks AI) into a single platform that operates across 3M+ sites in 180 countries
  and has processed 2.8B+ images. Developers integrate via a GraphQL API at https://www.dronedeploy.com/graphql,
  an Apps Platform with OAuth2 templates that embed third-party apps into the DroneDeploy web application, and
  a 40+ partner App Market spanning construction (Procore, Autodesk Construction Cloud, PlanGrid), GIS (ArcGIS,
  Mapbox), cloud storage (S3, Google Drive, OneDrive, Box, Azure), and agriculture (Climate FieldView).
