  description: The DroneDeploy Apps Platform lets third parties build embedded apps and serverless "functions"
    that run inside the DroneDeploy web application and the DroneDeploy App Market. Apps consume the GraphQL API
    on behalf of the signed-in user, can register OAuth2 flows via the oauth-function-template, and are surfaced
    in the App Market across construction, agriculture, mining, utilities, and renewable energy verticals.
